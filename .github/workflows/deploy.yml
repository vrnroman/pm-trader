name: Deploy

# Two ways in:
#   * Auto-deploy on merge — every push to main runs the test gate and, if it
#     passes, deploys to the GCP VM. Merging a PR ships it.
#   * Manual button — Actions -> Deploy -> Run workflow (e.g. from the GitHub
#     mobile app) to deploy on demand, with an optional skip-tests escape hatch.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run the full test suite before deploying"
        type: boolean
        default: true

concurrency:
  # never let two deploys race onto the same VM
  group: deploy-poly-poly-bot
  cancel-in-progress: false

jobs:
  test:
    name: Test gate
    runs-on: ubuntu-latest
    # Always gate auto-deploys (push); on a manual run honour the run_tests
    # toggle so the skip-tests escape hatch still works.
    if: ${{ github.event_name == 'push' || inputs.run_tests }}
    defaults:
      run:
        working-directory: poly_poly_bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff
      - name: Lint (ruff F821 — undefined names)
        run: ruff check --select F821 src main.py
      - name: Full test suite
        run: python -m pytest tests/ -q

  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    # run after the gate; `always() && !failure()` lets deploy proceed when the
    # test job is *skipped* (run_tests=false) but blocks it if tests actually fail
    needs: [test]
    if: ${{ always() && needs.test.result != 'failure' && needs.test.result != 'cancelled' }}
    defaults:
      run:
        working-directory: poly_poly_bot
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Materialize .env from secret
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "::error::ENV_FILE secret is empty — add it in repo Settings > Secrets"
            exit 1
          fi
          printf '%s' "$ENV_FILE" > .env
          echo "wrote .env ($(wc -l < .env) lines)"

          # polygon-rpc.com went 401 ("API key disabled, tenant disabled", 2026-06)
          # and spammed the balance fetch. Rewrite any pinned value to a keyless
          # working endpoint, in place — durable across deploys without editing
          # the ENV_FILE secret (which still pins the dead URL).
          sed -i -E 's#^RPC_URL=.*polygon-rpc\.com.*#RPC_URL=https://polygon-bor-rpc.publicnode.com#' .env

          # Default-on activation flags. Only appended if the ENV_FILE secret
          # doesn't already set them, so the secret stays the source of truth —
          # set the key there to override (e.g. WALLET_DISCOVERY_ENABLED=false).
          # docker --env-file takes the last value, so appended lines win only
          # over an absent key, never over one the secret defines earlier.
          ensure_env() {
            if ! grep -q "^$1=" .env; then
              printf '\n%s=%s\n' "$1" "$2" >> .env
              echo "  + $1=$2 (deploy default)"
            else
              echo "  = $1 kept from secret"
            fi
          }
          # Same, but the value is a secret (not echoed) and skipped if unset.
          secret_env() {
            if [ -n "$2" ] && ! grep -q "^$1=" .env; then
              printf '\n%s=%s\n' "$1" "$2" >> .env
              echo "  + $1=*** (from secret)"
            elif [ -z "$2" ]; then
              echo "  - $1 secret unset — skipped"
            else
              echo "  = $1 kept from secret"
            fi
          }
          ensure_env WALLET_DISCOVERY_ENABLED true
          ensure_env COPY_PAPER_ENABLED true
          # LLM wallet gate (Strategy 1c) — activate it + its Langfuse tracing.
          ensure_env WALLET_DISCOVERY_LLM_REVIEW_ENABLED true
          ensure_env LANGFUSE_HOST https://jp.cloud.langfuse.com
          secret_env CLAUDE_CODE_OAUTH_TOKEN "$CLAUDE_CODE_OAUTH_TOKEN"
          secret_env LANGFUSE_PUBLIC_KEY "$LANGFUSE_PUBLIC_KEY"
          secret_env LANGFUSE_SECRET_KEY "$LANGFUSE_SECRET_KEY"

      # deploy.sh builds the image HERE on the runner (native amd64, fast,
      # already GCP-authed), PUSHES it to Artifact Registry, and the VM PULLS it
      # over Google's internal network — the VM never builds and never receives
      # a tarball over IAP. This replaces the old build-on-VM path (40-min
      # CPU-starved build, 2026-06-15) and the interim save|gzip→scp→load path
      # (~10-min IAP transfer). GitHub-hosted runners ship Docker + BuildKit,
      # and the CI SA has artifactregistry.writer, so no extra setup step.
      - name: Build image + push to AR + deploy (IAP tunnel)
        env:
          DEPLOY_USE_IAP: "1"
          DOCKER_BUILDKIT: "1"
          # the Linux user whose ~/app holds the live deployment (repo variable,
          # not a secret); must match your local deploy user so data persists
          DEPLOY_SSH_USER: ${{ vars.DEPLOY_SSH_USER }}
        run: bash deploy.sh

      - name: Scrub secrets from runner
        if: always()
        run: rm -f .env
